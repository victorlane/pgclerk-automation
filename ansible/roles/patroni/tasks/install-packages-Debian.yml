---
- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

# python3-venv is split out of python3 on Debian/Ubuntu (it ships ensurepip).
# python3-pip is needed because the pip module on the venv path still relies
# on the system pip wrapper for the initial bootstrap.
- name: Ensure python3-venv and python3-pip are installed
  ansible.builtin.apt:
    name:
    - python3-venv
    - python3-pip
    - python3-setuptools
    state: present
