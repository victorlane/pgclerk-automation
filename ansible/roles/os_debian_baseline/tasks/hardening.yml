---
# Mirror of os_rhel_baseline/tasks/hardening.yml with the Debian-specific
# unit-name fact (ssh.service vs sshd.service).

- name: Set Debian-specific sshd unit name
  ansible.builtin.set_fact:
    _baseline_sshd_unit: ssh.service

# --- 1. SSH / logind OOM protection ----------------------------------------

- name: Ensure ssh.service drop-in directory exists
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ _baseline_sshd_unit }}.d"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: baseline_protect_sshd | bool

- name: Pin sshd OOM score so it survives memory pressure
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ _baseline_sshd_unit }}.d/10-oom-protect.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      OOMScoreAdjust={{ baseline_sshd_oom_score_adjust }}
  when: baseline_protect_sshd | bool
  notify: Reload systemd

- name: Ensure systemd-logind drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/systemd-logind.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: baseline_protect_logind | bool

- name: Pin systemd-logind OOM score so operator sessions survive
  ansible.builtin.copy:
    dest: /etc/systemd/system/systemd-logind.service.d/10-oom-protect.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      OOMScoreAdjust=-1000
  when: baseline_protect_logind | bool
  notify: Reload systemd

# --- 2. Postgres cgroup isolation ------------------------------------------

- name: Render pgclerk-postgres slice
  ansible.builtin.copy:
    dest: /etc/systemd/system/pgclerk-postgres.slice
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Resource isolation for managed PostgreSQL instances
      Before=slices.target

      [Slice]
      MemoryAccounting=yes
      CPUAccounting=yes
      IOAccounting=yes
      MemoryHigh={{ (ansible_facts.memtotal_mb | int * baseline_postgres_memory_high_fraction * 1024 * 1024) | int }}
      MemoryMax={{ (ansible_facts.memtotal_mb | int * baseline_postgres_memory_max_fraction * 1024 * 1024) | int }}
      CPUWeight={{ baseline_postgres_cpu_weight }}
      IOWeight={{ baseline_postgres_io_weight }}
  when: baseline_postgres_isolation | bool
  notify: Reload systemd

- name: Detect installed postgresql systemd unit (auto)
  ansible.builtin.find:
    paths:
    - /usr/lib/systemd/system
    - /etc/systemd/system
    patterns:
    - "postgresql.service"
    - "postgresql-*.service"
    - "postgresql@*.service"
    file_type: any
  register: _baseline_pg_unit_search
  when:
  - baseline_postgres_isolation | bool
  - baseline_postgres_service_unit | length == 0

- name: Resolve postgresql unit name
  ansible.builtin.set_fact:
    _baseline_pg_unit: >-
      {{ baseline_postgres_service_unit
         if baseline_postgres_service_unit | length > 0
         else ((_baseline_pg_unit_search.files | default([])) | map(attribute='path')
              | map('basename') | first | default('')) }}
  when: baseline_postgres_isolation | bool

- name: Skip PG slice binding when no postgresql unit is installed
  ansible.builtin.debug:
    msg: >-
      No postgresql systemd unit found on this host; the
      pgclerk-postgres.slice is created but not yet bound to anything.
      Apply this role again after the postgresql role installs PG.
  when:
  - baseline_postgres_isolation | bool
  - _baseline_pg_unit | default('') | length == 0

- name: Ensure postgresql drop-in directory exists
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ _baseline_pg_unit }}.d"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
  - baseline_postgres_isolation | bool
  - _baseline_pg_unit | default('') | length > 0

- name: Bind postgresql unit into pgclerk-postgres.slice
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ _baseline_pg_unit }}.d/10-pgclerk-slice.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      Slice=pgclerk-postgres.slice
      OOMScoreAdjust=200
  when:
  - baseline_postgres_isolation | bool
  - _baseline_pg_unit | default('') | length > 0
  notify: Reload systemd

# --- 3. sshd hardening + postgres login lock --------------------------------

- name: Ensure sshd_config.d exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: baseline_sshd_hardening | bool

- name: Render sshd_config drop-in
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-pgclerk.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by pgclerk / os_debian_baseline.
      {% for key, value in baseline_sshd_settings.items() %}
      {{ key }} {{ value }}
      {% endfor %}
  when: baseline_sshd_hardening | bool
  notify: Restart sshd

# See the parallel block in os_rhel_baseline/tasks/hardening.yml for the
# rationale: we lock postgres via sshd DenyUsers + passwd -l, not by
# changing the user's login shell, so PGDG's `su - postgres -c ...`
# admin invocations keep working.
# See os_rhel_baseline/tasks/hardening.yml for the inverted-match
# rationale (DenyUsers wins over later AllowUsers, so deny is scoped
# inside `Match Address !<peer_cidrs>` instead).
- name: Reject ssh-as-postgres in sshd_config drop-in
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/20-pgclerk-deny-postgres.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by pgclerk / os_debian_baseline.
      {% if baseline_allow_postgres_from | length > 0 %}
      Match Address {{ baseline_allow_postgres_from | map('regex_replace', '^', '!') | join(',') }}
          DenyUsers postgres
      {% else %}
      DenyUsers postgres
      {% endif %}
  when:
  - baseline_lock_postgres_login | bool
  - baseline_db_user == 'postgres'
  notify: Restart sshd

- name: Lock the postgres user password
  ansible.builtin.user:
    name: postgres
    password_lock: true
  when:
  - baseline_lock_postgres_login | bool
  - baseline_db_user == 'postgres'
  register: _baseline_pg_lock
  failed_when:
  - _baseline_pg_lock.failed | default(false)
  - "'does not exist' not in (_baseline_pg_lock.msg | default(''))"
