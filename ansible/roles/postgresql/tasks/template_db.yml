---
- name: Ensure hardened template database exists
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ postgresql_template_db }}"
    encoding: UTF8
    lc_collate: C.UTF-8
    lc_ctype: C.UTF-8
    template: template0
    state: present

# Extensions must be installed before the DB is frozen as a template.
# datistemplate=true blocks DROP/CONNECT so we set it only after this block.
- name: Install hardening extensions in template database
  become: true
  become_user: postgres
  community.postgresql.postgresql_ext:
    db: "{{ postgresql_template_db }}"
    name: "{{ item }}"
    state: present
  loop: "{{ postgresql_template_extensions }}"

- name: Harden search_path on template database
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ postgresql_template_db }}"
    query: ALTER DATABASE {{ postgresql_template_db | quote }} SET search_path = public, pg_catalog

- name: Lock down public schema and database privileges
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ postgresql_template_db }}"
    query: "{{ item }}"
  loop:
    - REVOKE CREATE ON SCHEMA public FROM PUBLIC
    - REVOKE ALL ON DATABASE {{ postgresql_template_db | quote }} FROM PUBLIC
    - GRANT CONNECT ON DATABASE {{ postgresql_template_db | quote }} TO PUBLIC
    - GRANT USAGE ON SCHEMA public TO PUBLIC

- name: Ensure base roles exist (idempotent)
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: postgres
    query: |
      DO $$ BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'db_readonly')  THEN CREATE ROLE db_readonly  NOLOGIN; END IF;
        IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'db_readwrite') THEN CREATE ROLE db_readwrite NOLOGIN; END IF;
        IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'db_admin')     THEN CREATE ROLE db_admin     NOLOGIN; END IF;
      END $$;

- name: Revoke default public privileges on tables, sequences, and functions
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ postgresql_template_db }}"
    query: "{{ item }}"
  loop:
    - ALTER DEFAULT PRIVILEGES REVOKE ALL ON TABLES    FROM PUBLIC
    - ALTER DEFAULT PRIVILEGES REVOKE ALL ON SEQUENCES FROM PUBLIC
    - ALTER DEFAULT PRIVILEGES REVOKE ALL ON FUNCTIONS FROM PUBLIC

- name: Grant connect and schema usage to base roles
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ postgresql_template_db }}"
    query: "{{ item }}"
  loop:
    - GRANT CONNECT ON DATABASE {{ postgresql_template_db | quote }} TO db_readonly, db_readwrite, db_admin
    - GRANT USAGE ON SCHEMA public TO db_readonly, db_readwrite, db_admin

- name: Set default privileges for base roles in public schema
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ postgresql_template_db }}"
    query: "{{ item }}"
  loop:
    - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO db_readonly
    - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO db_readwrite
    - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO db_readwrite
    - ALTER DEFAULT PRIVILEGES IN SCHEMA public REVOKE EXECUTE ON FUNCTIONS FROM PUBLIC
    - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT EXECUTE ON FUNCTIONS TO db_readwrite, db_readonly

- name: Set audit logging parameters on template database
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: "{{ postgresql_template_db }}"
    query: "{{ item }}"
  loop:
    - ALTER DATABASE {{ postgresql_template_db | quote }} SET log_statement = 'ddl'
    - ALTER DATABASE {{ postgresql_template_db | quote }} SET log_min_duration_statement = {{ postgresql_template_log_min_duration }}

- name: Set template database comment
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: postgres
    query: COMMENT ON DATABASE {{ postgresql_template_db | quote }} IS %(comment)s
    named_args:
      comment: "{{ postgresql_template_comment }}"

# datallowconn=true keeps the template connectable for cloning.
# This must be the final step — once datistemplate=true, extensions cannot be added.
- name: Freeze template database
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    db: postgres
    query: UPDATE pg_database SET datistemplate = TRUE, datallowconn = TRUE WHERE datname = %(db)s
    named_args:
      db: "{{ postgresql_template_db }}"
