---
# List of port-based rules. Each item:
#   { port: 5432, protocol: tcp, sources: ['10.0.0.0/8'], zone: public }
# protocol defaults to tcp, sources defaults to ['0.0.0.0/0'], zone to public.
firewall_rules: []

# List of named firewalld services to open (e.g. ['ssh', 'http']).
firewall_services: []

# Default zone for service rules.
firewall_default_zone: public
