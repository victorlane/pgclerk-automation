---
- name: Install dnf-automatic
  ansible.builtin.dnf:
    name: dnf-automatic
    state: present

- name: Deploy /etc/dnf/automatic.conf
  ansible.builtin.template:
    src: automatic.conf.j2
    dest: /etc/dnf/automatic.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnf-automatic timer

- name: Override dnf-automatic.timer schedule
  ansible.builtin.copy:
    dest: /etc/systemd/system/dnf-automatic.timer.d/override.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Timer]
      OnCalendar=
      OnCalendar={{ updates_timer_oncalendar }}
  notify: Restart dnf-automatic timer

- name: Enable and start dnf-automatic.timer
  ansible.builtin.systemd:
    name: dnf-automatic.timer
    enabled: true
    state: started
    daemon_reload: true
