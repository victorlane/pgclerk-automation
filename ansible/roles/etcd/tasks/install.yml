---
- name: Ensure etcd group exists
  ansible.builtin.group:
    name: "{{ etcd_group }}"
    system: true
    state: present

- name: Ensure etcd user exists
  ansible.builtin.user:
    name: "{{ etcd_user }}"
    group: "{{ etcd_group }}"
    system: true
    shell: /sbin/nologin
    home: "{{ etcd_data_dir }}"
    create_home: false
    state: present

- name: Check if etcd is already installed at the pinned version
  ansible.builtin.stat:
    path: "{{ etcd_install_dir }}/etcd"
  register: etcd_binary

- name: Download and unpack etcd release
  when: not etcd_binary.stat.exists
  block:
  - name: Create install directory
    ansible.builtin.file:
      path: "{{ etcd_install_dir }}"
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Fetch etcd tarball
    ansible.builtin.get_url:
      url: "{{ etcd_download_url }}"
      dest: "/tmp/etcd-v{{ etcd_version }}-linux-{{ etcd_arch }}.tar.gz"
      mode: "0644"

  - name: Extract etcd tarball
    ansible.builtin.unarchive:
      src: "/tmp/etcd-v{{ etcd_version }}-linux-{{ etcd_arch }}.tar.gz"
      dest: "{{ etcd_install_dir }}"
      remote_src: true
      extra_opts: [ "--strip-components=1" ]
      owner: root
      group: root

  - name: Remove tarball
    ansible.builtin.file:
      path: "/tmp/etcd-v{{ etcd_version }}-linux-{{ etcd_arch }}.tar.gz"
      state: absent

- name: Symlink etcd binaries into /usr/local/bin
  ansible.builtin.file:
    src: "{{ etcd_install_dir }}/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
    force: true
  loop:
  - etcd
  - etcdctl

- name: Ensure data directory exists
  ansible.builtin.file:
    path: "{{ etcd_data_dir }}"
    state: directory
    owner: "{{ etcd_user }}"
    group: "{{ etcd_group }}"
    mode: "0700"

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ etcd_config_dir }}"
    state: directory
    owner: "{{ etcd_user }}"
    group: "{{ etcd_group }}"
    mode: "0750"
