---
- name: Install chrony
  ansible.builtin.dnf:
    name: chrony
    state: present

- name: Deploy /etc/chrony.conf
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: "0644"
  when: (baseline_chrony_servers | length > 0) or (baseline_chrony_pools | length > 0)
  notify: Restart chronyd

- name: Enable and start chronyd
  ansible.builtin.systemd:
    name: chronyd
    enabled: true
    state: started
