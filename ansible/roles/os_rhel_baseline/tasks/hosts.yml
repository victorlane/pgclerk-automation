---
- name: Ensure FQDN is mapped to a stable IP in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^[^#]*\\s{{ baseline_hosts_fqdn | regex_escape }}(\\s|$)"
    line: "{{ baseline_hosts_ip }} {{ baseline_hosts_fqdn }} {{ baseline_hosts_aliases | join(' ') }}"
    owner: root
    group: root
    mode: "0644"
    state: present
  when: baseline_hosts_ip | length > 0
