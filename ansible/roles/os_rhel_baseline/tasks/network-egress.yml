---
# Node-level egress controls.  See defaults/main.yml for the mode catalogue.

- name: Assert proxy URL is set when mode=proxy
  ansible.builtin.assert:
    that: baseline_proxy_url | length > 0
    fail_msg: >-
      baseline_network_egress=proxy requires baseline_proxy_url to be set
      (e.g. http://proxy.customer.com:3128).
  when: baseline_network_egress == 'proxy'

# ----- Mode: proxy ----------------------------------------------------------

- name: Render /etc/environment proxy entries
  ansible.builtin.blockinfile:
    path: /etc/environment
    create: true
    owner: root
    group: root
    mode: "0644"
    marker: "# {mark} ANSIBLE pgclerk-proxy"
    block: |
      HTTP_PROXY={{ baseline_proxy_url }}
      HTTPS_PROXY={{ baseline_proxy_https_url }}
      http_proxy={{ baseline_proxy_url }}
      https_proxy={{ baseline_proxy_https_url }}
      NO_PROXY={{ baseline_proxy_no_proxy | join(',') }}
      no_proxy={{ baseline_proxy_no_proxy | join(',') }}
  when: baseline_network_egress == 'proxy'

- name: Render /etc/profile.d/proxy.sh
  ansible.builtin.copy:
    dest: /etc/profile.d/proxy.sh
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by pgclerk / os_rhel_baseline.
      export HTTP_PROXY="{{ baseline_proxy_url }}"
      export HTTPS_PROXY="{{ baseline_proxy_https_url }}"
      export http_proxy="{{ baseline_proxy_url }}"
      export https_proxy="{{ baseline_proxy_https_url }}"
      export NO_PROXY="{{ baseline_proxy_no_proxy | join(',') }}"
      export no_proxy="{{ baseline_proxy_no_proxy | join(',') }}"
  when: baseline_network_egress == 'proxy'

- name: Configure dnf to use the proxy
  community.general.ini_file:
    path: /etc/dnf/dnf.conf
    section: main
    option: proxy
    value: "{{ baseline_proxy_url }}"
    owner: root
    group: root
    mode: "0644"
    no_extra_spaces: true
  when: baseline_network_egress == 'proxy'

# rpm relies on curl/wget which read the env vars above, but provide a
# system-wide wgetrc shortcut too for installers that don't pick up env.
- name: Configure system-wide wgetrc proxy
  ansible.builtin.blockinfile:
    path: /etc/wgetrc
    create: true
    owner: root
    group: root
    mode: "0644"
    marker: "# {mark} ANSIBLE pgclerk-proxy"
    block: |
      use_proxy = on
      http_proxy = {{ baseline_proxy_url }}
      https_proxy = {{ baseline_proxy_https_url }}
  when: baseline_network_egress == 'proxy'

# Clean up: when the operator flips OFF proxy (mode=open), remove the
# blockinfile sections so the system goes back to direct.
- name: Clean up /etc/environment proxy entries when mode != proxy
  ansible.builtin.blockinfile:
    path: /etc/environment
    marker: "# {mark} ANSIBLE pgclerk-proxy"
    state: absent
  when: baseline_network_egress != 'proxy'

- name: Remove /etc/profile.d/proxy.sh when mode != proxy
  ansible.builtin.file:
    path: /etc/profile.d/proxy.sh
    state: absent
  when: baseline_network_egress != 'proxy'

- name: Remove dnf proxy when mode != proxy
  community.general.ini_file:
    path: /etc/dnf/dnf.conf
    section: main
    option: proxy
    state: absent
  when: baseline_network_egress != 'proxy'

- name: Clean up wgetrc proxy entries when mode != proxy
  ansible.builtin.blockinfile:
    path: /etc/wgetrc
    marker: "# {mark} ANSIBLE pgclerk-proxy"
    state: absent
  when: baseline_network_egress != 'proxy'

# ----- Mode: blocked --------------------------------------------------------
# Stubbed in v1 -- the nftables ruleset install is a follow-up.  Emit a
# loud warning so the operator knows the mode was requested but not yet
# enforced.

- name: Surface blocked-egress stub warning
  ansible.builtin.debug:
    msg:
    - "############################################################"
    - "baseline_network_egress=blocked is STUBBED on this host."
    - "The host accepts the var but does NOT yet enforce egress"
    - "restrictions -- nftables ruleset install is a v2 follow-up."
    - "Track via your usual issue queue."
    - "############################################################"
  when: baseline_network_egress == 'blocked'
