---
# Establish passwordless SSH trust as the `postgres` user between every host
# in `postgres_servers` and every host in `backup_servers`. The trust is
# bi-directional because pgBackRest pulls base backups from PG nodes (backup
# server -> PG node) and the asynchronous archive-push spool is shipped over
# the same SSH channel (PG node -> backup server).
#
# We do this self-contained inside the role using a fact-cache pass that
# fetches each host's pubkey and a `delegate_to` distribution pass.

# _pgbr_postgres_home is set in main.yml from _pg_os_variant: /var/lib/pgsql
# on RHEL/Amazon, /var/lib/postgresql on Debian. The user was created with
# that home in install.yml, so getent below confirms reality matches.
- name: Ensure postgres home exists with correct perms
  ansible.builtin.file:
    path: "{{ _pgbr_postgres_home }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Resolve postgres user home directory
  ansible.builtin.getent:
    database: passwd
    key: postgres

- name: Cache postgres home as fact (authoritative -- comes from passwd)
  ansible.builtin.set_fact:
    _pgbr_pg_home: "{{ ansible_facts['getent_passwd']['postgres'][4] }}"

- name: Ensure ~postgres/.ssh exists
  ansible.builtin.file:
    path: "{{ _pgbr_pg_home }}/.ssh"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Generate ed25519 keypair for postgres user
  community.crypto.openssh_keypair:
    path: "{{ _pgbr_pg_home }}/.ssh/id_ed25519"
    type: ed25519
    owner: postgres
    group: postgres
    mode: "0600"
    comment: "pgbackrest@{{ inventory_hostname }}"

- name: Read postgres user public key
  ansible.builtin.slurp:
    src: "{{ _pgbr_pg_home }}/.ssh/id_ed25519.pub"
  register: _pgbr_pubkey

- name: Cache pubkey as host fact
  ansible.builtin.set_fact:
    _pgbr_pubkey_text: "{{ _pgbr_pubkey['content'] | b64decode | trim }}"

# Distribute keys: each PG node trusts every backup_server's key, and each
# backup_server trusts every PG node's key. We use delegate_to to run the
# authorized_key module on the *target* host while pulling the pubkey value
# from hostvars.
- name: Authorize backup-server pubkeys on PG nodes
  ansible.posix.authorized_key:
    user: postgres
    key: "{{ hostvars[item]['_pgbr_pubkey_text'] }}"
    state: present
  loop: "{{ groups['backup_servers'] | default([]) }}"
  when:
  - _pgbr_is_pg_node
  - hostvars[item]['_pgbr_pubkey_text'] is defined
  loop_control:
    label: "{{ item }}"

- name: Authorize PG-node pubkeys on backup servers
  ansible.posix.authorized_key:
    user: postgres
    key: "{{ hostvars[item]['_pgbr_pubkey_text'] }}"
    state: present
  loop: "{{ groups['postgres_servers'] | default([]) }}"
  when:
  - _pgbr_is_backup_server
  - hostvars[item]['_pgbr_pubkey_text'] is defined
  loop_control:
    label: "{{ item }}"

# Pre-seed known_hosts so the first pgbackrest invocation doesn't have to
# answer a yes/no prompt over a non-interactive SSH session.  Resolve via
# ansible_host (private IP) so cloud hosts without DNS / /etc/hosts still
# get a usable known_hosts entry.
#
# Round-7 caught a race here: ssh-keyscan ran before the just-opened
# SG rule had propagated to each PG node's NIC.  Result was empty
# stdout, which the original `failed_when: false` + `when: results|length > 0`
# guard silently turned into "skip the known_hosts write".  Two minutes
# later, pgbackrest stanza-create on the same host tried SSH and ate
# back-to-back 2-minute connection-timeouts (rc=56 "unable to find
# primary cluster").
#
# Two fixes:
#   1. wait_for port 22 on each peer FIRST so we don't even attempt
#      ssh-keyscan against an unreachable host.
#   2. drop `failed_when: false` from keyscan + remove the silent
#      "skip when empty" guard on the write -- if keyscan returns
#      nothing the role should fail loudly, not silently leave
#      pgbackrest to discover the breakage at stanza time.
- name: Wait for SSH on each peer (avoids ssh-keyscan race after SG opens)
  ansible.builtin.wait_for:
    host: "{{ hostvars[item].ansible_host | default(item) }}"
    port: 22
    timeout: 120
  loop: "{{ (groups['backup_servers'] | default([])) if _pgbr_is_pg_node else (groups['postgres_servers'] | default([])) }}"
  loop_control:
    label: "{{ hostvars[item].ansible_host | default(item) }}"

- name: Scan host keys for the other side of the trust
  ansible.builtin.command: "ssh-keyscan -t ed25519,rsa,ecdsa {{ hostvars[item].ansible_host | default(item) }}"
  loop: "{{ (groups['backup_servers'] | default([])) if _pgbr_is_pg_node else (groups['postgres_servers'] | default([])) }}"
  register: _pgbr_keyscans
  changed_when: false
  retries: 5
  delay: 5
  until: _pgbr_keyscans.stdout | length > 0

- name: Write aggregated known_hosts for postgres user
  ansible.builtin.copy:
    dest: "{{ _pgbr_pg_home }}/.ssh/known_hosts"
    content: "{{ _pgbr_keyscans.results | map(attribute='stdout') | select | join('\n') }}\n"
    owner: postgres
    group: postgres
    mode: "0644"
