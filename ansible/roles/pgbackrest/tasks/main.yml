---
- name: Assert supported OS
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in ['RedHat', 'Debian'] or ansible_facts['distribution'] == 'Amazon'
    fail_msg: >-
      The pgbackrest role supports RedHat, Debian, and Amazon Linux;
      got distribution='{{ ansible_facts['distribution'] }}',
      os_family='{{ ansible_facts['os_family'] }}'.

# Mirror the postgresql role's variant derivation so package install and
# the postgres user's home directory land per-family without when-guards.
- name: Determine OS install variant
  ansible.builtin.set_fact:
    _pg_os_variant: >-
      {{ 'Amazon' if ansible_facts['distribution'] == 'Amazon'
         else ansible_facts['os_family'] }}

# The pgbackrest role runs on both PG nodes (which already have the postgres
# user from the postgresql role) and on dedicated backup_servers (which may
# not). The home path differs per OS: /var/lib/pgsql on RHEL/Amazon,
# /var/lib/postgresql on Debian/Ubuntu.
- name: Resolve postgres user home for this OS variant
  ansible.builtin.set_fact:
    _pgbr_postgres_home: >-
      {{ '/var/lib/postgresql' if _pg_os_variant == 'Debian'
         else '/var/lib/pgsql' }}

- name: Identify host role in the pgbackrest topology
  ansible.builtin.set_fact:
    _pgbr_is_pg_node: "{{ 'postgres_servers' in group_names }}"
    _pgbr_is_backup_server: "{{ 'backup_servers' in group_names }}"

- name: Assert host participates in pgbackrest topology
  ansible.builtin.assert:
    that: _pgbr_is_pg_node or _pgbr_is_backup_server
    fail_msg: >-
      Host {{ inventory_hostname }} is not in 'postgres_servers' or
      'backup_servers'; the pgbackrest role has nothing to do here.

- name: Assert pgbackrest_repos is non-empty
  ansible.builtin.assert:
    that:
      - pgbackrest_repos is sequence
      - pgbackrest_repos | length > 0
    fail_msg: "pgbackrest_repos must define at least one repo (type: server|s3)."

- name: Assert every repo declares a supported type
  ansible.builtin.assert:
    that: item.type in ['server', 's3']
    fail_msg: pgbackrest repo {{ item }} has unsupported type; expected 'server' or 's3'.
  loop: "{{ pgbackrest_repos }}"
  loop_control:
    label: "{{ item.type | default('?') }}"

- name: Validate server-type repos have a host
  ansible.builtin.assert:
    that:
      - item.host is defined
      - item.host | length > 0
    fail_msg: server-type pgbackrest repo must define 'host' (the backup server).
  loop: "{{ pgbackrest_repos }}"
  when: item.type == 'server'
  loop_control:
    label: "{{ item.host | default('?') }}"

- name: Validate s3-type repos have endpoint/bucket/key/secret
  ansible.builtin.assert:
    that:
      - item.endpoint is defined and item.endpoint | length > 0
      - item.bucket is defined and item.bucket | length > 0
      - item.key is defined and item.key | length > 0
      - item.key_secret is defined and item.key_secret | length > 0
    fail_msg: >-
      s3-type pgbackrest repo must define endpoint, bucket, key and key_secret.
  loop: "{{ pgbackrest_repos }}"
  when: item.type == 's3'
  loop_control:
    label: "{{ item.bucket | default('?') }}"

- name: Compute whether any server-type repo is configured
  ansible.builtin.set_fact:
    _pgbr_has_server_repo: "{{ pgbackrest_repos | selectattr('type', 'equalto', 'server') | list | length > 0 }}"

- name: Install pgBackRest
  ansible.builtin.include_tasks: install.yml

- name: Set up SSH trust between PG nodes and backup servers
  ansible.builtin.include_tasks: ssh-trust.yml
  when:
    - pgbackrest_manage_ssh_trust | bool
    - _pgbr_has_server_repo

- name: Render pgbackrest.conf and integrate with PostgreSQL
  ansible.builtin.include_tasks: configure.yml

- name: Apply pending PostgreSQL reload before stanza-create
  ansible.builtin.meta: flush_handlers

- name: Initialize stanza and run check
  ansible.builtin.include_tasks: stanza.yml

- name: Install scheduled backup units on the backup server
  ansible.builtin.include_tasks: schedule.yml
  when:
    - _pgbr_is_backup_server
    - pgbackrest_schedule | bool
