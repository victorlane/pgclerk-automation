---
- name: Install full-backup systemd service unit
  ansible.builtin.template:
    src: pgbackrest-backup.service.j2
    dest: /etc/systemd/system/pgbackrest-backup-full.service
    owner: root
    group: root
    mode: "0644"
  vars:
    _pgbr_backup_type: full
  notify: Reload systemd daemon

- name: Install full-backup systemd timer unit
  ansible.builtin.template:
    src: pgbackrest-backup.timer.j2
    dest: /etc/systemd/system/pgbackrest-backup-full.timer
    owner: root
    group: root
    mode: "0644"
  vars:
    _pgbr_backup_type: full
    _pgbr_schedule: "{{ pgbackrest_schedule_full }}"
  notify: Reload systemd daemon

- name: Install diff-backup systemd service unit
  ansible.builtin.template:
    src: pgbackrest-backup.service.j2
    dest: /etc/systemd/system/pgbackrest-backup-diff.service
    owner: root
    group: root
    mode: "0644"
  vars:
    _pgbr_backup_type: diff
  notify: Reload systemd daemon

- name: Install diff-backup systemd timer unit
  ansible.builtin.template:
    src: pgbackrest-backup.timer.j2
    dest: /etc/systemd/system/pgbackrest-backup-diff.timer
    owner: root
    group: root
    mode: "0644"
  vars:
    _pgbr_backup_type: diff
    _pgbr_schedule: "{{ pgbackrest_schedule_diff }}"
  notify: Reload systemd daemon

- name: Apply daemon-reload before enabling timers
  ansible.builtin.meta: flush_handlers

- name: Enable and start pgbackrest backup timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
  - pgbackrest-backup-full.timer
  - pgbackrest-backup-diff.timer
