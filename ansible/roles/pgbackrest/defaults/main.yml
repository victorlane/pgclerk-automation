---
# Stanza name. Used as a logical identifier for the cluster across all repos.
# Override per-environment when you run more than one cluster.
pgbackrest_stanza: main

# Local on-disk locations used on both PG nodes and the backup server.
pgbackrest_repo_path: /var/lib/pgbackrest
pgbackrest_log_path: /var/log/pgbackrest
pgbackrest_spool_path: /var/spool/pgbackrest

# Parallelism for backup/restore/archive operations.
pgbackrest_process_max: 2

# Repository specs. Each item is a dict describing one repo. Repos are
# emitted in list order as repo1-*, repo2-*, ... so multiple can coexist
# (e.g. a local server repo + an S3 repo for offsite copies).
#
# Server repo example:
#   - type: server
#     host: backup-01.example.com    # FQDN or IP of the backup host
#     path: /var/lib/pgbackrest      # path ON the backup host
#     retention_full: 2
#     retention_diff: 7
#
# S3 repo example:
#   - type: s3
#     endpoint: s3.eu-west-1.amazonaws.com
#     bucket: my-pgbackrest-bucket
#     region: eu-west-1
#     key: "{{ pgbackrest_s3_key }}"          # override via -e @secrets.yml
#     key_secret: "{{ pgbackrest_s3_key_secret }}"
#     path: /pgbackrest
#     retention_full: 2
#     retention_diff: 7
#     verify_tls: 'y'
pgbackrest_repos: []

# When true, the role will set up passwordless SSH trust (postgres user)
# between hosts in `postgres_servers` and hosts in `backup_servers`. Only
# applies when at least one repo of type 'server' is configured.
pgbackrest_manage_ssh_trust: true

# In standalone mode the role will set archive_mode/archive_command in
# postgresql.conf. In patroni mode this is force-disabled and a clear
# warning is emitted -- the consumer must add the params to patroni.yml.
pgbackrest_manage_archive_command: true

# Scheduled backups on the backup_servers host(s). Set to false to skip
# installing the systemd timers. Schedules use systemd OnCalendar syntax.
pgbackrest_schedule: true
pgbackrest_schedule_full: "Sun *-*-* 02:00:00"
pgbackrest_schedule_diff: "Mon..Sat *-*-* 02:00:00"

# Package name -- pulled from PGDG, which the postgresql role already
# enabled on every PG node. Backup servers must also have PGDG enabled.
pgbackrest_package: pgbackrest
