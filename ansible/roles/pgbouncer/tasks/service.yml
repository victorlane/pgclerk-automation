---
# pgbouncer is a single-process daemon. The package's stock unit doesn't
# set Restart=, so a SIGSEGV or OOM leaves the service down until ops
# notices. The drop-in below makes systemd restart-on-failure with a
# small backoff so transient crashes self-heal.
- name: Ensure pgbouncer systemd drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/pgbouncer.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Restart=on-failure systemd drop-in
  ansible.builtin.template:
    src: restart.conf.j2
    dest: /etc/systemd/system/pgbouncer.service.d/restart.conf
    owner: root
    group: root
    mode: "0644"
  notify:
  - Reload systemd daemon
  - Restart pgbouncer

# Flush so the daemon-reload runs before we start the unit -- otherwise
# the first start ignores the drop-in until the next systemctl reload.
- name: Apply systemd drop-in before starting pgbouncer
  ansible.builtin.meta: flush_handlers

- name: Ensure pgbouncer service is started and enabled
  ansible.builtin.service:
    name: pgbouncer
    state: started
    enabled: true
