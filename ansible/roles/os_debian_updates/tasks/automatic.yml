---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name:
    - unattended-upgrades
    - apt-listchanges
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Deploy /etc/apt/apt.conf.d/50unattended-upgrades
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  notify: Restart unattended-upgrades

- name: Enable periodic apt activity (20auto-upgrades)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Ensure apt-daily-upgrade.timer drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/apt-daily-upgrade.timer.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Override apt-daily-upgrade.timer schedule
  ansible.builtin.copy:
    dest: /etc/systemd/system/apt-daily-upgrade.timer.d/override.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Timer]
      OnCalendar=
      OnCalendar={{ updates_timer_oncalendar }}
  notify: Restart apt-daily-upgrade timer

- name: Enable and start apt-daily-upgrade.timer
  ansible.builtin.systemd:
    name: apt-daily-upgrade.timer
    enabled: true
    state: started
    daemon_reload: true
