---
# Add a database to an already-provisioned PostgreSQL deployment.
#
# Topology dispatch (set per customer in inventory group_vars/all.yml):
#   self-managed-vm-aws, self-managed-vm-gcp -> SSH + community.postgresql.postgresql_db
#                                               (current behaviour)
#   aws-rds, aws-aurora                      -> libpq via inventory_hostname
#                                               (RDS/Aurora endpoint), master
#                                               credentials looked up in AWS
#                                               Secrets Manager.
#   cloudsql                                 -> google.cloud.gcp_sql_database
#                                               using CloudSQL admin API.
#   alloydb                                  -> libpq via inventory_hostname
#                                               (AlloyDB endpoint), master
#                                               credentials looked up in GCP
#                                               Secret Manager (no native
#                                               AlloyDB database module).
#
# Required vars (all topologies):
#   db_name           - database name to create.
#
# Optional vars (all topologies):
#   db_owner          - owning role (default: postgres).
#   db_encoding       - character set encoding (default: UTF8).
#   db_lc_collate     - LC_COLLATE for the new DB (default: omit).
#   db_lc_ctype       - LC_CTYPE for the new DB (default: omit).
#   db_template       - template to clone from (default: omit).
#   db_extensions     - list of extension names to CREATE EXTENSION in the
#                       new DB (default: []).
#
# Required vars (managed AWS, topology in [aws-rds, aws-aurora]):
#   cloud_region                 - AWS region of the instance.
#   managed_instance_id          - RDS DB / Aurora cluster identifier.
#   master_credential_secret_arn - ARN of AWS Secrets Manager secret holding
#                                  {"username": ..., "password": ...}.
#
# Required vars (managed GCP, topology in [cloudsql, alloydb]):
#   cloud_project                - GCP project ID.
#   cloud_region                 - GCP region of the instance.
#   managed_instance_id          - CloudSQL instance or AlloyDB cluster ID.
#   master_credential_secret_id  - Secret Manager secret name holding
#                                  {"username": ..., "password": ...}.
#
# Required collections:
#   community.postgresql (>=3.0)
#   amazon.aws           (>=7.0) - for aws_secret lookup
#   community.aws        (>=7.0)
#   google.cloud         (>=1.3) - for gcp_sql_database + gcp_secret_manager_*
#
# Example (VM):
#   ansible-playbook playbooks/maintenance/add-database.yml \
#     -e db_name=billing -e db_owner=billing_app \
#     -e '{"db_extensions": ["pg_stat_statements", "pgcrypto"]}' \
#     --limit customer_acme
#
# Example (RDS):
#   ansible-playbook playbooks/maintenance/add-database.yml \
#     -e db_name=billing --limit customer_acme_rds

- name: Add database (topology-aware)
  hosts: "{{ groups['postgres_primary'] | default([]) | first | default(groups['postgres_servers'] | default(['localhost']) | first) }}"
  become: false
  gather_facts: false
  vars:
    db_owner: postgres
    db_encoding: UTF8
    db_extensions: []
  tasks:
  - name: Refuse to run without an explicit --limit
    ansible.builtin.assert:
      that: ansible_limit is defined
      fail_msg: >-
        Refusing to run add-database against the entire inventory. Re-run with
        --limit <customer_group_or_host>.

  - name: Assert required vars are defined
    ansible.builtin.assert:
      that:
      - db_name is defined
      - db_name | length > 0
      - topology is defined
      - topology in ['self-managed-vm-aws', 'self-managed-vm-gcp',
                     'aws-rds', 'aws-aurora', 'cloudsql', 'alloydb']
      fail_msg: >-
        db_name and a valid topology must be provided.

  # ---------------------------------------------------------------------
  # Branch: self-managed VM (existing SSH path)
  # ---------------------------------------------------------------------
  - name: Add database on self-managed VM via SSH
    when: topology in ['self-managed-vm-aws', 'self-managed-vm-gcp']
    become: true
    block:
    - name: Ensure database exists (VM)
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_owner }}"
        encoding: "{{ db_encoding }}"
        lc_collate: "{{ db_lc_collate | default(omit) }}"
        lc_ctype: "{{ db_lc_ctype | default(omit) }}"
        template: "{{ db_template | default(omit) }}"
        state: present

    - name: Ensure requested extensions are installed (VM)
      become_user: postgres
      community.postgresql.postgresql_ext:
        db: "{{ db_name }}"
        name: "{{ item }}"
        state: present
      loop: "{{ db_extensions }}"

    - name: Fetch pg_database row (VM)
      become_user: postgres
      community.postgresql.postgresql_query:
        db: postgres
        query: >-
          SELECT datname, pg_catalog.pg_get_userbyid(datdba) AS owner,
                 pg_catalog.pg_encoding_to_char(encoding) AS encoding,
                 datcollate, datctype
          FROM pg_database WHERE datname = %s
        positional_args:
        - "{{ db_name }}"
      register: _db_row_vm

    - name: Fetch installed extensions (VM)
      become_user: postgres
      community.postgresql.postgresql_query:
        db: "{{ db_name }}"
        query: >-
          SELECT extname, extversion FROM pg_extension ORDER BY extname
      register: _db_exts_vm

    - name: Show database row (VM)
      ansible.builtin.debug:
        var: _db_row_vm.query_result

    - name: Show installed extensions (VM)
      ansible.builtin.debug:
        var: _db_exts_vm.query_result

  # ---------------------------------------------------------------------
  # Branch: AWS RDS / Aurora (libpq over endpoint, secret from AWS SM)
  # ---------------------------------------------------------------------
  - name: Add database on AWS RDS / Aurora via libpq
    when: topology in ['aws-rds', 'aws-aurora']
    delegate_to: localhost
    block:
    - name: Assert required AWS-managed vars
      ansible.builtin.assert:
        that:
        - cloud_region is defined
        - managed_instance_id is defined
        - master_credential_secret_arn is defined
        fail_msg: >-
          cloud_region, managed_instance_id, master_credential_secret_arn
          must be defined for aws-rds / aws-aurora topologies.

    - name: Look up master credentials from AWS Secrets Manager
      ansible.builtin.set_fact:
        _rds_master: >-
          {{ lookup('amazon.aws.aws_secret',
                    master_credential_secret_arn,
                    region=cloud_region) | from_json }}
      no_log: true

    - name: Ensure database exists (RDS/Aurora)
      community.postgresql.postgresql_db:
        login_host: "{{ inventory_hostname }}"
        login_user: "{{ _rds_master.username }}"
        login_password: "{{ _rds_master.password }}"
        login_db: postgres
        name: "{{ db_name }}"
        owner: "{{ db_owner }}"
        encoding: "{{ db_encoding }}"
        lc_collate: "{{ db_lc_collate | default(omit) }}"
        lc_ctype: "{{ db_lc_ctype | default(omit) }}"
        template: "{{ db_template | default(omit) }}"
        state: present
      no_log: true

    - name: Ensure requested extensions are installed (RDS/Aurora)
      community.postgresql.postgresql_ext:
        login_host: "{{ inventory_hostname }}"
        login_user: "{{ _rds_master.username }}"
        login_password: "{{ _rds_master.password }}"
        db: "{{ db_name }}"
        name: "{{ item }}"
        state: present
      loop: "{{ db_extensions }}"
      no_log: true

    - name: Fetch installed extensions (RDS/Aurora)
      community.postgresql.postgresql_query:
        login_host: "{{ inventory_hostname }}"
        login_user: "{{ _rds_master.username }}"
        login_password: "{{ _rds_master.password }}"
        db: "{{ db_name }}"
        query: >-
          SELECT extname, extversion FROM pg_extension ORDER BY extname
      register: _db_exts_rds
      no_log: true

    - name: Show installed extensions (RDS/Aurora)
      ansible.builtin.debug:
        var: _db_exts_rds.query_result

  # ---------------------------------------------------------------------
  # Branch: CloudSQL (native gcp_sql_database module)
  # ---------------------------------------------------------------------
  - name: Add database on CloudSQL via admin API
    when: topology == 'cloudsql'
    delegate_to: localhost
    block:
    - name: Assert required CloudSQL vars
      ansible.builtin.assert:
        that:
        - cloud_project is defined
        - managed_instance_id is defined
        fail_msg: >-
          cloud_project and managed_instance_id must be defined for the
          cloudsql topology.

    - name: Ensure database exists (CloudSQL)
      google.cloud.gcp_sql_database:
        name: "{{ db_name }}"
        charset: "{{ db_encoding }}"
        collation: "{{ db_lc_collate | default(omit) }}"
        instance: "{{ managed_instance_id }}"
        project: "{{ cloud_project }}"
        auth_kind: application
        state: present

    - name: Note CloudSQL extension constraint
      ansible.builtin.debug:
        msg:
        - "CloudSQL extensions cannot be installed by the admin API."
        - "Approved extensions are enabled per-instance via cloudsql.enable_*"
        - "database_flags. Requested db_extensions={{ db_extensions }} were"
        - "NOT created. Run the autotune playbook with the appropriate flag"
        - "list, then CREATE EXTENSION via libpq with an authorised role."

  # ---------------------------------------------------------------------
  # Branch: AlloyDB (libpq over endpoint, no native database module)
  # ---------------------------------------------------------------------
  - name: Add database on AlloyDB via libpq
    when: topology == 'alloydb'
    delegate_to: localhost
    block:
    - name: Assert required AlloyDB vars
      ansible.builtin.assert:
        that:
        - cloud_project is defined
        - managed_instance_id is defined
        - master_credential_secret_id is defined
        fail_msg: >-
          cloud_project, managed_instance_id, master_credential_secret_id
          must be defined for the alloydb topology.

    - name: Look up master credentials from GCP Secret Manager
      google.cloud.gcp_secret_manager:
        name: "{{ master_credential_secret_id }}"
        project: "{{ cloud_project }}"
        auth_kind: application
      register: _alloydb_secret
      no_log: true

    - name: Parse AlloyDB master credentials JSON
      ansible.builtin.set_fact:
        _alloydb_master: "{{ _alloydb_secret.value | from_json }}"
      no_log: true

    - name: Ensure database exists (AlloyDB)
      community.postgresql.postgresql_db:
        login_host: "{{ inventory_hostname }}"
        login_user: "{{ _alloydb_master.username }}"
        login_password: "{{ _alloydb_master.password }}"
        login_db: postgres
        name: "{{ db_name }}"
        owner: "{{ db_owner }}"
        encoding: "{{ db_encoding }}"
        lc_collate: "{{ db_lc_collate | default(omit) }}"
        lc_ctype: "{{ db_lc_ctype | default(omit) }}"
        template: "{{ db_template | default(omit) }}"
        state: present
      no_log: true

    - name: Ensure requested extensions are installed (AlloyDB)
      community.postgresql.postgresql_ext:
        login_host: "{{ inventory_hostname }}"
        login_user: "{{ _alloydb_master.username }}"
        login_password: "{{ _alloydb_master.password }}"
        db: "{{ db_name }}"
        name: "{{ item }}"
        state: present
      loop: "{{ db_extensions }}"
      no_log: true
