---
# Rotate a SQL role's password (topology-aware).
#
# Topology dispatch:
#   self-managed-vm-aws, self-managed-vm-gcp -> SSH + community.postgresql.
#                                               postgresql_user (existing).
#   aws-rds, aws-aurora                      -> if user_name == master role
#                                               and rotate_master_via_secret
#                                               is true: rotate the AWS
#                                               Secrets Manager secret (the
#                                               RDS-managed password flow).
#                                               Otherwise: SQL-level ALTER
#                                               USER over libpq, then write
#                                               the new value back into the
#                                               app-user secret.
#   cloudsql                                 -> google.cloud.gcp_sql_user
#                                               (admin API).  Also writes the
#                                               new value back into the
#                                               app-user secret if one is
#                                               passed.
#   alloydb                                  -> google.cloud.gcp_alloydb_user
#                                               (admin API).  Also writes the
#                                               new value back into the
#                                               app-user secret if one is
#                                               passed.
#
# Required vars (all topologies):
#   user_name      - role whose password is being rotated.
#   new_password   - new password (pass via -e @secrets.yml).
#
# Required vars (aws-rds, aws-aurora):
#   cloud_region                  - AWS region.
#   managed_instance_id           - DB instance / cluster ID (for the master
#                                   rotation path).
#   master_credential_secret_arn  - ARN of the master credential secret
#                                   (only required when connecting via libpq
#                                   to do an ALTER USER).
#
# Required vars (cloudsql, alloydb):
#   cloud_project       - GCP project ID.
#   cloud_region        - GCP region (alloydb only).
#   managed_instance_id - CloudSQL instance ID or AlloyDB cluster ID.
#   (alloydb only) managed_instance_name - AlloyDB primary instance name.
#
# Optional vars:
#   app_user_secret_arn / app_user_secret_id - if set, the new password is
#                                              written back to the named
#                                              secret as a JSON object
#                                              {"username":..., "password":...}.
#   rotate_master_via_secret - bool (default: false). For aws-rds/aurora,
#                              triggers `aws secretsmanager rotate-secret`
#                              instead of an ALTER USER. Use only when the
#                              RDS instance was provisioned with
#                              manage_master_user_password=true.
#
# Required collections:
#   community.postgresql, amazon.aws, community.aws, google.cloud
#
# Example (VM):
#   ansible-playbook playbooks/maintenance/rotate-password.yml \
#     -e user_name=billing_app -e @new_secret.yml --limit customer_acme

- name: Rotate SQL role password (topology-aware)
  hosts: "{{ groups['postgres_primary'] | default([]) | first | default(groups['postgres_servers'] | default(['localhost']) | first) }}"
  become: false
  gather_facts: false
  tasks:
  - name: Refuse to run without an explicit --limit
    ansible.builtin.assert:
      that: ansible_limit is defined
      fail_msg: >-
        Refusing to run rotate-password against the entire inventory. Re-run
        with --limit <customer_group_or_host>.

  - name: Assert required vars are defined
    ansible.builtin.assert:
      that:
      - user_name is defined
      - user_name | length > 0
      - new_password is defined
      - new_password | length > 0
      - topology is defined
      - topology in ['self-managed-vm-aws', 'self-managed-vm-gcp',
                     'aws-rds', 'aws-aurora', 'cloudsql', 'alloydb']
      fail_msg: "user_name, new_password and a valid topology are required."
    no_log: true

  # ---------------------------------------------------------------------
  # Branch: self-managed VM (existing)
  # ---------------------------------------------------------------------
  - name: Rotate password on self-managed VM via SSH
    when: topology in ['self-managed-vm-aws', 'self-managed-vm-gcp']
    become: true
    block:
    - name: Update role password (VM)
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ user_name }}"
        password: "{{ new_password }}"
        state: present
      no_log: true

    - name: Count sessions still authenticated as the role (VM)
      become_user: postgres
      community.postgresql.postgresql_query:
        db: postgres
        query: >-
          SELECT pid, datname, application_name, client_addr, state,
                 backend_start, state_change
          FROM pg_stat_activity
          WHERE usename = %s
          ORDER BY backend_start
        positional_args:
        - "{{ user_name }}"
      register: _existing_sessions_vm

    - name: Report active sessions under the rotated role (VM)
      ansible.builtin.debug:
        msg:
        - "Password for {{ user_name }} rotated."
        - "Existing sessions still using prior auth: {{ _existing_sessions_vm.rowcount }}"

    - name: Show session detail (VM)
      ansible.builtin.debug:
        var: _existing_sessions_vm.query_result
      when: _existing_sessions_vm.rowcount | int > 0

  # ---------------------------------------------------------------------
  # Branch: AWS RDS / Aurora
  # ---------------------------------------------------------------------
  - name: Rotate password on AWS RDS / Aurora
    when: topology in ['aws-rds', 'aws-aurora']
    delegate_to: localhost
    block:
    - name: Assert AWS-managed vars
      ansible.builtin.assert:
        that:
        - cloud_region is defined
        - managed_instance_id is defined
        fail_msg: >-
          cloud_region and managed_instance_id are required for AWS RDS /
          Aurora rotation.

    # ---- Master-rotation path: just rotate the SM secret -----------------
    - name: Rotate the RDS-managed master secret via Secrets Manager
      when: rotate_master_via_secret | default(false) | bool
      ansible.builtin.command: >-
        aws secretsmanager rotate-secret
          --region {{ cloud_region }}
          --secret-id {{ master_credential_secret_arn }}
      register: _rds_rotate_sm
      changed_when: _rds_rotate_sm.rc == 0
      no_log: true

    # ---- App-user path: ALTER USER over libpq, then update SM ------------
    - name: Look up master credentials from AWS Secrets Manager
      when: not (rotate_master_via_secret | default(false) | bool)
      ansible.builtin.set_fact:
        _rds_master: >-
          {{ lookup('amazon.aws.aws_secret',
                    master_credential_secret_arn,
                    region=cloud_region) | from_json }}
      no_log: true

    - name: ALTER USER on RDS/Aurora over libpq
      when: not (rotate_master_via_secret | default(false) | bool)
      community.postgresql.postgresql_user:
        login_host: "{{ inventory_hostname }}"
        login_user: "{{ _rds_master.username }}"
        login_password: "{{ _rds_master.password }}"
        login_db: postgres
        name: "{{ user_name }}"
        password: "{{ new_password }}"
        state: present
      no_log: true

    - name: Update Secrets Manager copy of the app-user credential
      when:
      - not (rotate_master_via_secret | default(false) | bool)
      - app_user_secret_arn is defined
      ansible.builtin.command: >-
        aws secretsmanager put-secret-value
          --region {{ cloud_region }}
          --secret-id {{ app_user_secret_arn }}
          --secret-string {{ ({"username": user_name,
                               "password": new_password}) | to_json | quote }}
      register: _rds_sm_put
      changed_when: _rds_sm_put.rc == 0
      no_log: true

  # ---------------------------------------------------------------------
  # Branch: CloudSQL
  # ---------------------------------------------------------------------
  - name: Rotate password on CloudSQL
    when: topology == 'cloudsql'
    delegate_to: localhost
    block:
    - name: Assert CloudSQL vars
      ansible.builtin.assert:
        that:
        - cloud_project is defined
        - managed_instance_id is defined
        fail_msg: >-
          cloud_project and managed_instance_id are required for CloudSQL.

    - name: Set CloudSQL user password
      google.cloud.gcp_sql_user:
        name: "{{ user_name }}"
        host: "%"
        instance: "{{ managed_instance_id }}"
        password: "{{ new_password }}"
        project: "{{ cloud_project }}"
        auth_kind: application
        state: present
      no_log: true

    - name: Update GCP Secret Manager copy of the app-user credential
      when: app_user_secret_id is defined
      ansible.builtin.command: >-
        gcloud secrets versions add {{ app_user_secret_id }}
          --project {{ cloud_project }}
          --data-file=-
      args:
        stdin: "{{ {'username': user_name, 'password': new_password} | to_json }}"
      register: _cs_sm_put
      changed_when: _cs_sm_put.rc == 0
      no_log: true

  # ---------------------------------------------------------------------
  # Branch: AlloyDB
  # ---------------------------------------------------------------------
  - name: Rotate password on AlloyDB
    when: topology == 'alloydb'
    delegate_to: localhost
    block:
    - name: Assert AlloyDB vars
      ansible.builtin.assert:
        that:
        - cloud_project is defined
        - cloud_region is defined
        - managed_instance_id is defined
        fail_msg: >-
          cloud_project, cloud_region, managed_instance_id are required for
          AlloyDB. managed_instance_id is the cluster ID.

    - name: Set AlloyDB user password
      google.cloud.gcp_alloydb_user:
        name: "{{ user_name }}"
        password: "{{ new_password }}"
        user_type: ALLOYDB_BUILT_IN
        cluster: >-
          projects/{{ cloud_project }}/locations/{{ cloud_region }}/clusters/{{ managed_instance_id }}
        project: "{{ cloud_project }}"
        auth_kind: application
        state: present
      no_log: true

    - name: Update GCP Secret Manager copy of the app-user credential (AlloyDB)
      when: app_user_secret_id is defined
      ansible.builtin.command: >-
        gcloud secrets versions add {{ app_user_secret_id }}
          --project {{ cloud_project }}
          --data-file=-
      args:
        stdin: "{{ {'username': user_name, 'password': new_password} | to_json }}"
      register: _alloydb_sm_put
      changed_when: _alloydb_sm_put.rc == 0
      no_log: true
