---
# Add a SQL role to an existing cluster and (optionally) grant per-DB privileges.
#
# Required vars:
#   user_name       - role name to create.
#   user_password   - password for the role (passed via -e @secrets.yml).
#
# Optional vars:
#   user_role_attrs - role_attr_flags string (default: "LOGIN"). Passed verbatim
#                     to community.postgresql.postgresql_user (e.g.
#                     "LOGIN,CREATEDB" or "LOGIN,NOSUPERUSER").
#   user_grants     - list of {db: <name>, priv: "<priv string>"} dicts (default: []).
#                     priv is forwarded to community.postgresql.postgresql_privs
#                     in its standard semicolon-separated form, e.g.
#                     "CONNECT/TEMPORARY" or "ALL".
#
# Runs against the primary only. Password handling is no_log.
#
# Example:
#
#   ansible-playbook playbooks/maintenance/add-user.yml \
#     -e user_name=billing_app -e @secrets.yml \
#     -e '{"user_grants": [{"db": "billing", "priv": "ALL"}]}' \
#     --limit customer_acme

- name: Add SQL role and grant privileges
  hosts: "{{ groups['postgres_primary'] | default([]) | first | default(groups['postgres_servers'] | first) }}"
  become: true
  gather_facts: false
  vars:
    user_role_attrs: LOGIN
    user_grants: []
  tasks:
    - name: Refuse to run without an explicit --limit
      ansible.builtin.assert:
        that: ansible_limit is defined
        fail_msg: >-
          Refusing to run add-user against the entire inventory. Re-run with
          --limit <customer_group_or_host>.

    - name: Assert required vars are defined
      ansible.builtin.assert:
        that:
          - user_name is defined
          - user_name | length > 0
          - user_password is defined
          - user_password | length > 0
        fail_msg: user_name and user_password must both be provided.
      no_log: true

    - name: Ensure role exists with desired attributes
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ user_name }}"
        password: "{{ user_password }}"
        role_attr_flags: "{{ user_role_attrs }}"
        state: present
      no_log: true

    - name: Grant per-database privileges
      become_user: postgres
      community.postgresql.postgresql_privs:
        login_db: "{{ item.db }}"
        roles: "{{ user_name }}"
        type: database
        privs: "{{ item.priv }}"
        state: present
      loop: "{{ user_grants }}"
      loop_control:
        label: "{{ item.db }}"
      no_log: true

    - name: Show role summary (no password)
      become_user: postgres
      community.postgresql.postgresql_query:
        db: postgres
        query: >-
          SELECT rolname, rolsuper, rolcreatedb, rolcreaterole, rolcanlogin,
                 rolreplication, rolconnlimit, rolvaliduntil
          FROM pg_roles WHERE rolname = %s
        positional_args:
          - "{{ user_name }}"
      register: _role_row

    - name: Display role row
      ansible.builtin.debug:
        var: _role_row.query_result
