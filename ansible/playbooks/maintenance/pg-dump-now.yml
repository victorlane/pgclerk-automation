---
# On-demand pg_dump of a single database into a local file on the PG host.
# This is NOT a replacement for pgBackRest -- it produces a logical dump for
# one-off transfers, schema snapshots, or pre-migration captures.
#
# Required vars:
#   db_name        - database to dump.
#
# Optional vars:
#   dump_path      - target directory on the PG host (default:
#                    /var/backups/pgclerk). Created if missing, mode 0750,
#                    owned by postgres.
#   dump_format    - pg_dump -F format: c|d|t|p (default: custom).
#                      c = custom (single file, compressed)
#                      d = directory (parallel-capable)
#                      t = tar
#                      p = plain SQL
#   dump_filename  - basename of the dump (default:
#                    "{db_name}_{ansible_date_time.iso8601_basic_short}.dump").
#                    For format=d this is the directory name.
#   dump_jobs      - parallel jobs, only honoured for dump_format=d (default: 4).
#
# Read-only against the source DB. Runs on the primary by default; safe to
# point at a replica via --limit for offload.
#
# Example:
#
#   ansible-playbook playbooks/maintenance/pg-dump-now.yml \
#     -e db_name=billing -e dump_format=d -e dump_jobs=8 \
#     --limit customer_acme_primary

- name: On-demand pg_dump
  hosts: "{{ groups['postgres_primary'] | default([]) | first | default(groups['postgres_servers'] | first) }}"
  become: true
  gather_facts: true
  vars:
    dump_path: /var/backups/pgclerk
    dump_format: c
    dump_jobs: 4
  tasks:
    - name: Assert required vars are defined
      ansible.builtin.assert:
        that:
          - db_name is defined
          - db_name | length > 0
          - dump_format in ['c', 'd', 't', 'p']
        fail_msg: db_name is required; dump_format must be one of c|d|t|p.

    - name: Resolve dump filename
      ansible.builtin.set_fact:
        _dump_filename: "{{ dump_filename | default(db_name ~ '_' ~ ansible_date_time.iso8601_basic_short ~ '.dump') }}"

    - name: Compose full target path
      ansible.builtin.set_fact:
        _dump_target: "{{ dump_path }}/{{ _dump_filename }}"

    - name: Ensure dump directory exists
      ansible.builtin.file:
        path: "{{ dump_path }}"
        state: directory
        owner: postgres
        group: postgres
        mode: "0750"

    - name: Run pg_dump ({{ dump_format }}) for {{ db_name }}
      become_user: postgres
      ansible.builtin.command:
        argv: >-
          {{
            ['pg_dump', '-F', dump_format] +
            (['-j', dump_jobs | string, '-f', _dump_target] if dump_format == 'd'
             else ['-f', _dump_target]) +
            [db_name]
          }}
      register: _pg_dump
      changed_when: true

    - name: Stat the resulting dump
      ansible.builtin.stat:
        path: "{{ _dump_target }}"
      register: _dump_stat

    - name: Report dump result
      ansible.builtin.debug:
        msg:
          - "Dump complete: {{ _dump_target }}"
          - "Format: {{ dump_format }}"
          - "Size:   {{ _dump_stat.stat.size | default('unknown') }} bytes"
          - "Exists: {{ _dump_stat.stat.exists }}"

    - name: Report pg_dump stderr (warnings, if any)
      ansible.builtin.debug:
        var: _pg_dump.stderr_lines
      when: _pg_dump.stderr_lines | length > 0
