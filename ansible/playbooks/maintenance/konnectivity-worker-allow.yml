---
# Auto-allow a registered Konnectivity worker agent.
#
# Given a worker agent's source IPs (one per local interface) and the
# Postgres database it needs to reach, this playbook:
#   1. Opens the firewall on every cluster node to admit those IPs on 5432
#   2. Appends a hostssl line to pg_hba.conf admitting the app user from
#      those IPs, then reloads Postgres
#   3. In Patroni mode: prints the patroni.yml pg_hba: stanza you need
#      to add instead of editing pg_hba.conf directly (matches the
#      pattern used by backup-now.yml etc.)
#
# Inputs (extra-vars):
#   konnectivity_worker_ips   list of CIDRs to admit, e.g. ['10.4.1.7/32']
#   konnectivity_app_db       database name the worker connects to
#   konnectivity_app_user     postgres role the worker connects as
#   konnectivity_worker_label freeform string to put in the comment

- name: Worker allow · firewall
  hosts: postgres_servers
  become: true
  vars:
    konnectivity_worker_label: konnectivity-worker
  tasks:
    - name: Assert inputs
      ansible.builtin.assert:
        that:
          - konnectivity_worker_ips is defined and konnectivity_worker_ips | length > 0
          - konnectivity_app_db is defined and konnectivity_app_db | length > 0
          - konnectivity_app_user is defined and konnectivity_app_user | length > 0
        fail_msg: konnectivity_worker_ips, konnectivity_app_db, konnectivity_app_user required

    - name: Open 5432 to worker IPs (RHEL family)
      ansible.posix.firewalld:
        rich_rule: rule family=ipv4 source address={{ item }} port port=5432 protocol=tcp accept
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ konnectivity_worker_ips }}"
      when: ansible_facts.os_family == 'RedHat'

    - name: Open 5432 to worker IPs (Debian family)
      community.general.ufw:
        rule: allow
        proto: tcp
        port: "5432"
        from_ip: "{{ item }}"
      loop: "{{ konnectivity_worker_ips }}"
      when: ansible_facts.os_family == 'Debian'

- name: Worker allow · pg_hba
  hosts: postgres_primary
  become: true
  become_user: postgres
  vars:
    _hba_lines: |
      {% for ip in konnectivity_worker_ips %}
      hostssl {{ konnectivity_app_db }} {{ konnectivity_app_user }} {{ ip }} scram-sha-256   # {{ konnectivity_worker_label }}
      {% endfor %}
  tasks:
    - name: Print Patroni mode instructions
      ansible.builtin.debug:
        msg: |
          Patroni mode detected. Do NOT edit pg_hba.conf directly. Add this
          block under bootstrap.dcs.postgresql.pg_hba in your patroni.yml,
          re-apply the patroni role, then `patronictl reload`:

          {{ _hba_lines }}
      when: postgresql_ha_mode | default('standalone') == 'patroni'

    - name: Append pg_hba lines (standalone)
      ansible.builtin.blockinfile:
        path: "{{ pgsql_data_directory }}/pg_hba.conf"
        block: "{{ _hba_lines }}"
        marker: "# {mark} KONNECTIVITY: {{ konnectivity_worker_label }}"
        insertafter: EOF
        backup: true
      when: postgresql_ha_mode | default('standalone') == 'standalone'
      notify: Reload postgres

  handlers:
    - name: Reload postgres
      ansible.builtin.service:
        name: postgresql
        state: reloaded
