---
# Atom: install the pgclerk-konnectivity agent on a Linux host.
#
# This is the playbook the operator points a Semaphore task template at.
# It targets the `konnectivity_targets` inventory group so the same task
# template can be reused for "install on the whole cluster" (server mode,
# limit to `postgres_servers`) and "install on app boxes" (worker mode,
# limit to whatever group holds the customer app fleet).
#
# Per-OS handling lives in the `konnectivity_agent` role (mirrors the
# node_exporter dispatch). Inputs are passed as Semaphore extra-vars or
# environment-defined variables.
#
# Required extra-vars:
#   konnectivity_server_url       https://pgclerk.example.com
#   konnectivity_bootstrap_token  pgm_bs_…  (single-use, cluster-scoped)
#   konnectivity_cluster          slug of the konnectivity cluster
#   konnectivity_mode             server | worker
#
# Worker-mode also needs:
#   konnectivity_worker_probe     host:port the worker should probe
#
# Optional:
#   konnectivity_version          'latest' (default) or a tag like v0.4.1
#   konnectivity_labels           "az=eu-west-1a,role=primary"
#   konnectivity_allow_exec       0 (default) | 1
- name: Konnectivity · install agent
  hosts: konnectivity_targets
  become: true
  gather_facts: true
  roles:
    - role: konnectivity_agent
