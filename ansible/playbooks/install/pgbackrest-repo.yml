---
# Atom: pgBackRest on PG nodes (clients) + backup_servers (repo host).
- name: OS baseline on backup hosts
  hosts: backup_servers
  become: true
  gather_facts: true
  roles:
    - role: os_baseline

- name: PgBackRest install + configure
  hosts: postgres_servers:backup_servers
  become: true
  gather_facts: true
  roles:
    - role: pgbackrest
