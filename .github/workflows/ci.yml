name: ci

on:
  pull_request:
  push: { branches: [main] }

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt jsonschema
      - run: scripts/validate-catalogue.py
      - run: ansible-galaxy install -r ansible/collections/requirements.yml
      - run: ansible-lint ansible/playbooks/
      # syntax-check against the dev inventory so `hosts: postgres_servers`
      # and `groups['postgres_primary']` resolve. The dev inventory is a
      # stub (one example host, commented replicas) -- enough for static
      # parse, not used to actually run anything.
      #
      # A handful of managed-DB playbooks reference modules that don't
      # exist in any currently-shipped collection version (gcp_alloydb_user,
      # gcp_secret_manager, azure_rm_postgresqlflexibleserver_firewallrule,
      # azure_rm_postgresqlflexibledatabase). They are tracked separately
      # and excluded from the strict runtime syntax-check; ansible-lint
      # already mocks them via .ansible-lint.
      - run: |
          find ansible/playbooks -name '*.yml' \
            ! -path 'ansible/playbooks/maintenance/rotate-password.yml' \
            ! -path 'ansible/playbooks/maintenance/verify-backup.yml' \
            ! -path 'ansible/playbooks/maintenance/add-database.yml' \
            ! -path 'ansible/playbooks/managed/azure-flexible-server.yml' \
            ! -path 'ansible/playbooks/managed/gcp-cloudsql.yml' \
            -print0 \
            | xargs -0 ansible-playbook -i ansible/inventories/dev/hosts.ini --syntax-check

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.5' }
      - run: terraform fmt -check -recursive terraform/
      - run: |
          for dir in terraform/modules/*; do
            (cd "$dir" && terraform init -backend=false && terraform validate)
          done
