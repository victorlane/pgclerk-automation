name: ci

on:
  pull_request:
  push: { branches: [main] }

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt jsonschema
      - run: scripts/validate-catalogue.py
      - run: ansible-galaxy install -r ansible/collections/requirements.yml
      - run: ansible-lint ansible/playbooks/
      - run: ansible-playbook --syntax-check ansible/playbooks/**/*.yml

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.5' }
      - run: terraform fmt -check -recursive terraform/
      - run: |
          for dir in terraform/modules/*; do
            (cd "$dir" && terraform init -backend=false && terraform validate)
          done
