---
# Operator-app catalogue. SOURCE OF TRUTH for what playbooks the
# pgclerk UI shows, in what filter group, and with what guard rails.
#
# Schema (validated by scripts/validate-catalogue.py):
#
#   - key:           kebab-case identifier, stable across renames.
#     title:         display name in the UI.
#     playbook:      path relative to repo root.
#     category:      install | maintenance | observability | managed
#     surface:       linux | rhel | debian | terraform | aws | gcp | azure | postgres
#     pg_kind:       install | task | n/a — "install" = brings PG up,
#                    "task" = day-2 op against a running cluster.
#     destructive:   true if the play drops/overwrites data.
#     requires_window: true if scheduling against the cluster's
#                    maintenance window is required.
#     min_pg_version: optional lower bound (string).
#     description:   one short line (≤120 chars).
#
# Filter rules (the UI groups by these axes):
#   1. Category   — install / maintenance / observability / managed
#   2. Surface    — OS scope vs cloud vs postgres-only
#   3. PG kind    — install vs task vs n/a
#   4. Destructive flag — orthogonal toggle

version: 1

